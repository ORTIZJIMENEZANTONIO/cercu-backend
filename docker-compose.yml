version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cercu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cercu_db
      MYSQL_USER: cercu
      MYSQL_PASSWORD: cercu_dev_2024
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cercu-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: cercu
      DB_PASSWORD: cercu_dev_2024
      DB_DATABASE: cercu_db
      JWT_SECRET: dev-jwt-secret-key
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      OTP_MOCK: "true"
      OTP_MOCK_CODE: "1234"
      OTP_EXPIRY_MINUTES: "5"
      CORS_ORIGIN: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - /app/node_modules

volumes:
  mysql_data: